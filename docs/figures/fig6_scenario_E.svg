  <rect x="527" y="138" width="11" height="25" fill="#D4763C" fill-opacity="0.30" stroke="#D4763C" stroke-width="1"/>
  <!-- Gain: 5F (106->138, +32) -->
  <rect x="506" y="113" width="32" height="25" fill="#D4763C" fill-opacity="0.30" stroke="#D4763C" stroke-width="1"/>

  <line x1="568" y1="35" x2="568" y2="238" stroke="#333" stroke-width="1.2" stroke-dasharray="5,4"/>

