  <rect x="541" y="188" width="7" height="25" fill="#2B5C8A" fill-opacity="0.12" stroke="#2B5C8A" stroke-width="0.8" stroke-dasharray="2,2"/>
  <rect x="541" y="163" width="7" height="25" fill="#2B5C8A" fill-opacity="0.12" stroke="#2B5C8A" stroke-width="0.8" stroke-dasharray="2,2"/>

