  <line x1="541" y1="247" x2="568" y2="247" stroke="#D4763C" stroke-width="0.7"/>
  <circle cx="541" cy="247" r="1.5" fill="#D4763C"/>
  <circle cx="568" cy="247" r="1.5" fill="#D4763C"/>
  <text x="555" y="259" text-anchor="middle" fill="#D4763C" font-size="8" font-weight="600">2.0m</text>

  <line x1="538" y1="140" x2="568" y2="140" stroke="#D4763C" stroke-width="0.7"/>
  <circle cx="538" cy="140" r="1.5" fill="#D4763C"/>
  <circle cx="568" cy="140" r="1.5" fill="#D4763C"/>
  <text x="553" y="136" text-anchor="middle" fill="#D4763C" font-size="8" font-weight="600">5m</text>

  <line x1="485" y1="100" x2="568" y2="100" stroke="#D4763C" stroke-width="0.7"/>
  <circle cx="485" cy="100" r="1.5" fill="#D4763C"/>
  <circle cx="568" cy="100" r="1.5" fill="#D4763C"/>
  <text x="526" y="96" text-anchor="middle" fill="#D4763C" font-size="8" font-weight="600">h÷2</text>

  <text x="640" y="120" fill="#D4763C" font-size="9" font-weight="600">← 면적 증가</text>
  <text x="648" y="134" fill="#D4763C" font-size="9">(4~5층)</text>

  <text x="632" y="195" fill="#2B5C8A" font-size="9" font-weight="600">← 면적 감소</text>
  <text x="648" y="209" fill="#2B5C8A" font-size="9">(1~3층)</text>
</svg>
