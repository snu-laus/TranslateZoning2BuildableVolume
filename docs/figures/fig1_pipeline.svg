<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2B5C8A"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D4763C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" fill="white"/>

  <!-- Stage 1 -->
  <rect x="20" y="20" width="240" height="240" rx="6" fill="#E8F0F8" stroke="#2B5C8A" stroke-width="1.5"/>
  <rect x="20" y="20" width="240" height="32" rx="6" fill="#2B5C8A"/>
  <text x="140" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">[1단계] RAG 기반 법규 수집</text>

  <!-- Stage 1 content -->
  <rect x="40" y="70" width="200" height="30" rx="4" fill="white" stroke="#2B5C8A" stroke-width="1"/>
  <text x="140" y="90" text-anchor="middle" fill="#333" font-size="11">자연어 질의</text>

  <line x1="140" y1="100" x2="140" y2="118" stroke="#2B5C8A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="40" y="120" width="200" height="30" rx="4" fill="white" stroke="#2B5C8A" stroke-width="1"/>
  <text x="140" y="140" text-anchor="middle" fill="#333" font-size="11">TF-IDF 검색기 + 711개 청크</text>

  <line x1="140" y1="150" x2="140" y2="168" stroke="#2B5C8A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="40" y="170" width="200" height="30" rx="4" fill="#2B5C8A" stroke="#2B5C8A" stroke-width="1"/>
  <text x="140" y="190" text-anchor="middle" fill="white" font-size="11" font-weight="500">법규 원문 (8개 조문)</text>

  <!-- Stage 1 designer -->
  <rect x="35" y="215" width="210" height="34" rx="4" fill="none" stroke="#D4763C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="140" y="228" text-anchor="middle" fill="#D4763C" font-size="10">설계자: 질의 분할, 조문 선별</text>
  <circle cx="50" cy="237" r="2" fill="#D4763C"/>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="155" x2="288" y2="155" stroke="#2B5C8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="274" y="145" text-anchor="middle" fill="#2B5C8A" font-size="9">법규 원문</text>

  <!-- Stage 2 -->
  <rect x="290" y="20" width="240" height="240" rx="6" fill="#FDF0E8" stroke="#D4763C" stroke-width="1.5"/>
  <rect x="290" y="20" width="240" height="32" rx="6" fill="#D4763C"/>
  <text x="410" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">[2단계] RASE 기반 로직 구조화</text>

  <!-- Stage 2 content -->
  <rect x="310" y="70" width="200" height="30" rx="4" fill="white" stroke="#D4763C" stroke-width="1"/>
  <text x="410" y="90" text-anchor="middle" fill="#333" font-size="11">법규 원문 (1단계 산출물)</text>

  <line x1="410" y1="100" x2="410" y2="118" stroke="#D4763C" stroke-width="1.2" marker-end="url(#arrow-dash)"/>

  <rect x="310" y="120" width="200" height="30" rx="4" fill="white" stroke="#D4763C" stroke-width="1"/>
  <text x="410" y="140" text-anchor="middle" fill="#333" font-size="11">LLM + RASE 프롬프트</text>

  <line x1="410" y1="150" x2="410" y2="168" stroke="#D4763C" stroke-width="1.2" marker-end="url(#arrow-dash)"/>

  <!-- RASE JSON - double border emphasis -->
  <rect x="310" y="170" width="200" height="30" rx="4" fill="#D4763C" stroke="#D4763C" stroke-width="1"/>
  <rect x="313" y="173" width="194" height="24" rx="3" fill="none" stroke="white" stroke-width="0.8"/>
  <text x="410" y="190" text-anchor="middle" fill="white" font-size="11" font-weight="600">RASE JSON 명세서</text>

  <!-- Stage 2 designer -->
  <rect x="305" y="215" width="210" height="34" rx="4" fill="none" stroke="#D4763C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="228" text-anchor="middle" fill="#D4763C" font-size="10">설계자: 원문 대조, 수치 교정</text>
  <circle cx="320" cy="237" r="2" fill="#D4763C"/>

  <!-- Arrow 2→3 -->
  <line x1="530" y1="155" x2="558" y2="155" stroke="#2B5C8A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="544" y="145" text-anchor="middle" fill="#2B5C8A" font-size="9">RASE JSON</text>

  <!-- Stage 3 -->
  <rect x="560" y="20" width="240" height="240" rx="6" fill="#E8F0F8" stroke="#2B5C8A" stroke-width="1.5"/>
  <rect x="560" y="20" width="240" height="32" rx="6" fill="#2B5C8A"/>
  <text x="680" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="600">[3단계] 기하 연산 코드 구현</text>

  <!-- Stage 3 content -->
  <rect x="580" y="70" width="200" height="30" rx="4" fill="white" stroke="#2B5C8A" stroke-width="1"/>
  <text x="680" y="90" text-anchor="middle" fill="#333" font-size="11">RASE JSON (2단계 산출물)</text>

  <line x1="680" y1="100" x2="680" y2="118" stroke="#2B5C8A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="580" y="120" width="200" height="30" rx="4" fill="white" stroke="#2B5C8A" stroke-width="1"/>
  <text x="680" y="140" text-anchor="middle" fill="#333" font-size="11">LLM 코딩 도구 + Rhino API</text>

  <line x1="680" y1="150" x2="680" y2="168" stroke="#2B5C8A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="580" y="170" width="200" height="30" rx="4" fill="#2B5C8A" stroke="#2B5C8A" stroke-width="1"/>
  <text x="680" y="190" text-anchor="middle" fill="white" font-size="11" font-weight="500">층별 건축 가능 면적(㎡)</text>

  <!-- Stage 3 designer -->
  <rect x="575" y="215" width="210" height="34" rx="4" fill="none" stroke="#D4763C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="680" y="228" text-anchor="middle" fill="#D4763C" font-size="10">설계자: 오류 수정, 결과 검증</text>
  <circle cx="590" cy="237" r="2" fill="#D4763C"/>

  <!-- Feedback loop -->
  <path d="M 410,270 L 410,345 L 680,345 L 680,270" fill="none" stroke="#D4763C" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <rect x="440" y="333" width="200" height="22" rx="3" fill="white" stroke="#D4763C" stroke-width="0.8"/>
  <text x="540" y="349" text-anchor="middle" fill="#D4763C" font-size="10">규제 변경 시: JSON 수치만 수정 후 재실행</text>

  <!-- Legend -->
  <rect x="20" y="290" width="12" height="12" rx="2" fill="#2B5C8A"/>
  <text x="38" y="301" fill="#333" font-size="10">산출물</text>
  <rect x="100" y="290" width="12" height="12" rx="2" fill="none" stroke="#D4763C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="118" y="301" fill="#333" font-size="10">설계자 개입</text>
  <rect x="200" y="290" width="12" height="12" rx="2" fill="#D4763C"/>
  <rect x="202" y="292" width="8" height="8" rx="1" fill="none" stroke="white" stroke-width="0.6"/>
  <text x="218" y="301" fill="#333" font-size="10">핵심 매개체 (RASE JSON)</text>
</svg>
