<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 500; }
  .ts { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 400; }
  .arr { stroke: #5F5E5A; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }

  /* Teal - pipeline stages */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Gray - data nodes */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #2C2C2A; }
  .c-gray .ts { fill: #5F5E5A; }

  /* Coral - scenario branch */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  /* Purple - human review */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  text.label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Input: Parcel data -->
<g class="c-gray">
  <rect x="42" y="32" width="152" height="40" rx="4" stroke-width="0.5"/>
  <text class="th" x="118" y="52" text-anchor="middle" dominant-baseline="central">Parcel data</text>
</g>

<!-- Input: Regulation DB -->
<g class="c-gray">
  <rect x="206" y="32" width="152" height="40" rx="4" stroke-width="0.5"/>
  <text class="th" x="282" y="52" text-anchor="middle" dominant-baseline="central">Regulation DB</text>
</g>

<!-- Merge lines into Stage 1 -->
<line x1="118" y1="72" x2="118" y2="88" class="arr"/>
<line x1="282" y1="72" x2="282" y2="88" class="arr"/>
<line x1="118" y1="88" x2="282" y2="88" class="arr"/>
<line x1="200" y1="88" x2="200" y2="105" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 1 -->
<g class="c-teal">
  <rect x="40" y="105" width="320" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="127" text-anchor="middle" dominant-baseline="central">Stage 1: RAG retrieval</text>
  <text class="ts" x="200" y="147" text-anchor="middle" dominant-baseline="central">TF-IDF search + structural chunking</text>
</g>

<line x1="200" y1="165" x2="200" y2="188" class="arr" marker-end="url(#arrow)"/>

<!-- Intermediate: Retrieved statutes -->
<g class="c-gray">
  <rect x="70" y="188" width="260" height="34" rx="4" stroke-width="0.5"/>
  <text class="ts" x="200" y="205" text-anchor="middle" dominant-baseline="central">Retrieved statutes (8 articles)</text>
</g>

<line x1="200" y1="222" x2="200" y2="248" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 2 -->
<g class="c-teal">
  <rect x="40" y="248" width="320" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="270" text-anchor="middle" dominant-baseline="central">Stage 2: RASE structuring</text>
  <text class="ts" x="200" y="290" text-anchor="middle" dominant-baseline="central">LLM → RASE JSON specification</text>
</g>

<line x1="200" y1="308" x2="200" y2="334" class="arr" marker-end="url(#arrow)"/>

<!-- Intermediate: RASE JSON -->
<g class="c-gray">
  <rect x="70" y="334" width="260" height="34" rx="4" stroke-width="0.5"/>
  <text class="ts" x="200" y="351" text-anchor="middle" dominant-baseline="central">RASE JSON specification</text>
</g>

<line x1="200" y1="368" x2="200" y2="380" class="arr"/>

<!-- Scenario branch badge -->
<g class="c-coral">
  <rect x="110" y="380" width="180" height="22" rx="4" stroke-width="0.5"/>
  <text class="ts" x="200" y="391" text-anchor="middle" dominant-baseline="central">Modify h_threshold only</text>
</g>

<line x1="200" y1="402" x2="200" y2="412" class="arr"/>
<line x1="118" y1="412" x2="282" y2="412" class="arr"/>
<line x1="118" y1="412" x2="118" y2="420" class="arr" marker-end="url(#arrow)"/>
<line x1="282" y1="412" x2="282" y2="420" class="arr" marker-end="url(#arrow)"/>

<!-- Scenario A -->
<g class="c-coral">
  <rect x="42" y="420" width="152" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="118" y="436" text-anchor="middle" dominant-baseline="central">h = 10 m</text>
  <text class="ts" x="118" y="452" text-anchor="middle" dominant-baseline="central">current regulation</text>
</g>

<!-- Scenario B -->
<g class="c-coral">
  <rect x="206" y="420" width="152" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="282" y="436" text-anchor="middle" dominant-baseline="central">h = 17 m</text>
  <text class="ts" x="282" y="452" text-anchor="middle" dominant-baseline="central">proposed amendment</text>
</g>

<!-- Merge into Stage 3 -->
<line x1="118" y1="464" x2="118" y2="476" class="arr"/>
<line x1="282" y1="464" x2="282" y2="476" class="arr"/>
<line x1="118" y1="476" x2="282" y2="476" class="arr"/>
<line x1="200" y1="476" x2="200" y2="490" class="arr" marker-end="url(#arrow)"/>

<!-- Stage 3 -->
<g class="c-teal">
  <rect x="40" y="490" width="320" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="512" text-anchor="middle" dominant-baseline="central">Stage 3: Code implementation</text>
  <text class="ts" x="200" y="532" text-anchor="middle" dominant-baseline="central">Rhino geometry engine</text>
</g>

<!-- Split to outputs -->
<line x1="200" y1="550" x2="200" y2="562" class="arr"/>
<line x1="118" y1="562" x2="282" y2="562" class="arr"/>
<line x1="118" y1="562" x2="118" y2="578" class="arr" marker-end="url(#arrow)"/>
<line x1="282" y1="562" x2="282" y2="578" class="arr" marker-end="url(#arrow)"/>

<!-- Output A -->
<g class="c-gray">
  <rect x="42" y="578" width="152" height="50" rx="4" stroke-width="0.5"/>
  <text class="th" x="118" y="596" text-anchor="middle" dominant-baseline="central">Envelope + CSV</text>
  <text class="ts" x="118" y="614" text-anchor="middle" dominant-baseline="central">Scenario A (10 m)</text>
</g>

<!-- Output B -->
<g class="c-gray">
  <rect x="206" y="578" width="152" height="50" rx="4" stroke-width="0.5"/>
  <text class="th" x="282" y="596" text-anchor="middle" dominant-baseline="central">Envelope + CSV</text>
  <text class="ts" x="282" y="614" text-anchor="middle" dominant-baseline="central">Scenario B (17 m)</text>
</g>

<!-- Human-in-the-loop column header -->
<text class="label" x="540" y="96" text-anchor="middle">Human-in-the-loop</text>

<!-- Human review 1 -->
<g class="c-purple">
  <rect x="455" y="110" width="170" height="50" rx="4" stroke-width="0.5"/>
  <text class="th" x="540" y="128" text-anchor="middle" dominant-baseline="central">Designer reviews</text>
  <text class="ts" x="540" y="146" text-anchor="middle" dominant-baseline="central">statute completeness</text>
</g>
<line x1="365" y1="135" x2="450" y2="135" class="leader" marker-end="url(#arrow)"/>

<!-- Human review 2 -->
<g class="c-purple">
  <rect x="455" y="253" width="170" height="50" rx="4" stroke-width="0.5"/>
  <text class="th" x="540" y="271" text-anchor="middle" dominant-baseline="central">Designer verifies</text>
  <text class="ts" x="540" y="289" text-anchor="middle" dominant-baseline="central">RASE accuracy</text>
</g>
<line x1="365" y1="278" x2="450" y2="278" class="leader" marker-end="url(#arrow)"/>

<!-- Human review 3 -->
<g class="c-purple">
  <rect x="455" y="495" width="170" height="50" rx="4" stroke-width="0.5"/>
  <text class="th" x="540" y="513" text-anchor="middle" dominant-baseline="central">Designer validates</text>
  <text class="ts" x="540" y="531" text-anchor="middle" dominant-baseline="central">code execution</text>
</g>
<line x1="365" y1="520" x2="450" y2="520" class="leader" marker-end="url(#arrow)"/>

</svg>
